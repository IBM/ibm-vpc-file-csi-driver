syntax = "proto3";

package tunnel;

option go_package = "github.com/IBM/ibm-vpc-file-csi-driver/pkg/tunnel/proto";

// TunnelManager service manages stunnel processes for RFS encryption in transit
service TunnelManager {
  // EnsureTunnel creates a new tunnel or increments refcount if it exists
  rpc EnsureTunnel(EnsureTunnelRequest) returns (EnsureTunnelResponse);
  
  // RemoveTunnel decrements refcount and removes tunnel if refcount reaches zero
  rpc RemoveTunnel(RemoveTunnelRequest) returns (RemoveTunnelResponse);
  
  // GetTunnel retrieves information about a specific tunnel
  rpc GetTunnel(GetTunnelRequest) returns (GetTunnelResponse);
  
  // ListTunnels returns all active tunnels
  rpc ListTunnels(ListTunnelsRequest) returns (ListTunnelsResponse);
  
  // Health checks the health of the tunnel manager service
  rpc Health(HealthRequest) returns (HealthResponse);
}

// EnsureTunnelRequest contains parameters for creating or reusing a tunnel
message EnsureTunnelRequest {
  // volumeID is the unique identifier for the NFS share
  string volume_id = 1;
  
  // nfs_server is the IP address of the NFS server
  string nfs_server = 2;
}

// EnsureTunnelResponse returns information about the ensured tunnel
message EnsureTunnelResponse {
  // tunnel contains the tunnel information
  TunnelInfo tunnel = 1;
  
  // created indicates if a new tunnel was created (true) or reused (false)
  bool created = 2;
}

// RemoveTunnelRequest contains parameters for removing a tunnel
message RemoveTunnelRequest {
  // volume_id is the unique identifier for the NFS share
  string volume_id = 1;
}

// RemoveTunnelResponse indicates the result of tunnel removal
message RemoveTunnelResponse {
  // removed indicates if the tunnel was completely removed (true) or just decremented (false)
  bool removed = 1;
  
  // ref_count is the remaining reference count after removal
  int32 ref_count = 2;
}

// GetTunnelRequest contains parameters for retrieving tunnel information
message GetTunnelRequest {
  // volume_id is the unique identifier for the NFS share
  string volume_id = 1;
}

// GetTunnelResponse returns tunnel information
message GetTunnelResponse {
  // tunnel contains the tunnel information
  TunnelInfo tunnel = 1;
  
  // found indicates if the tunnel was found
  bool found = 2;
}

// ListTunnelsRequest is empty as it lists all tunnels
message ListTunnelsRequest {
  // No parameters needed
}

// ListTunnelsResponse returns all active tunnels
message ListTunnelsResponse {
  // tunnels is the list of all active tunnels
  repeated TunnelInfo tunnels = 1;
  
  // total_count is the total number of tunnels
  int32 total_count = 2;
}

// HealthRequest checks service health
message HealthRequest {
  // No parameters needed
}

// HealthResponse indicates service health status
message HealthResponse {
  // status indicates the health status
  HealthStatus status = 1;
  
  // message provides additional health information
  string message = 2;
  
  // active_tunnels is the number of currently active tunnels
  int32 active_tunnels = 3;
  
  // failed_tunnels is the number of failed tunnels
  int32 failed_tunnels = 4;
}

// HealthStatus represents the health state of the service
enum HealthStatus {
  UNKNOWN = 0;
  HEALTHY = 1;
  UNHEALTHY = 2;
  DEGRADED = 3;
}

// TunnelInfo contains information about a tunnel
message TunnelInfo {
  // volume_id is the unique identifier for the NFS share
  string volume_id = 1;
  
  // remote_addr is the NFS server IP address
  string remote_addr = 2;
  
  // local_port is the local port the tunnel listens on
  int32 local_port = 3;
  
  // state is the current state of the tunnel
  string state = 4;
  
  // ref_count is the number of active mounts using this tunnel
  int32 ref_count = 5;
  
  // restart_count is the number of times the tunnel has been restarted
  int32 restart_count = 6;
  
  // last_healthy is the timestamp of the last successful health check (Unix timestamp)
  int64 last_healthy = 7;
  
  // config_path is the path to the stunnel configuration file
  string config_path = 8;
}